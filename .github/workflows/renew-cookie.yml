name: Renew SuperMonitor Cookie

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Install Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
        working-directory: scripts

      - name: Install Chromium system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: sudo npx playwright install-deps chromium
        working-directory: scripts

      - name: Renovar cookie
        env:
          SUPERMONITOR_EMAIL:       ${{ secrets.SUPERMONITOR_EMAIL }}
          SUPERMONITOR_PASSWORD:    ${{ secrets.SUPERMONITOR_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/renew-cookie.mjs

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          if-no-files-found: ignore
