name: Renew SuperMonitor Cookie

on:
  # Cron desativado: GitHub Actions usa IPs de datacenter bloqueados pelo Cloudflare.
  # A renovação agora roda localmente via Windows Task Scheduler (scripts/setup-task-scheduler.ps1).
  # schedule:
  #   - cron: '0 */2 * * *'
  workflow_dispatch:   # mantido para testes manuais ocasionais

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 5       # HTTP puro é rápido — sem browser, sem espera de captcha

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Renovar cookie
        env:
          SUPERMONITOR_EMAIL:        ${{ secrets.SUPERMONITOR_EMAIL }}
          SUPERMONITOR_PASSWORD:     ${{ secrets.SUPERMONITOR_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/renew-cookie.mjs
